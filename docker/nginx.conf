server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Force HTTPS - Redirect all HTTP to HTTPS
    # (If SSL is terminated at reverse proxy level, this won't be needed)
    # But we set headers anyway for safety
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Forward protocol headers to PHP
        #fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        #fastcgi_param HTTPS $https;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTPS on;
    }

    # Serve static assets directly
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Uploaded assets from storage
    location /storage/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Custom asset images (public/assets/images)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Livewire assets
    location /vendor/livewire/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # Handle Filament assets
    location ~ ^/filament/assets {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
