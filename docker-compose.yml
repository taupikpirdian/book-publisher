services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-publisher
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../assets/book_publisher:/var/www/storage/app/public
      - ./storage/logs:/var/www/storage/logs
      - app_bootstrap_book_publisher:/var/www/bootstrap/cache
      - app_build_book_publisher:/var/www/public/build
    networks:
      - book-publisher-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: book-publisher-nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./public:/var/www/public
      - ../assets/book_publisher:/var/www/storage/app/public
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - app_build_book_publisher:/var/www/public/build
    networks:
      - book-publisher-network
    depends_on:
      - app

networks:
  book-publisher-network:
    driver: bridge

volumes:
  app_bootstrap_book_publisher:
    driver: local
  app_build_book_publisher:
    driver: local
