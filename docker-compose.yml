services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-publisher
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Uploaded assets sync to host
      - ../assets/book_publisher:/var/www/storage/app/public
      # Logs (specific folder)
      - ./storage/logs:/var/www/storage/logs
      # Bootstrap cache (persistent)
      - app_bootstrap_book_publisher:/var/www/bootstrap/cache
      # Vite build assets (persistent)
      - app_build_book_publisher:/var/www/public/build
    networks:
      - book-publisher-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: book-publisher-nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      # Public folder (named volume - will be populated by init script)
      - app_public:/var/www/public
      # Nginx config
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      # Uploaded assets (same as app)
      - ../assets/book_publisher:/var/www/storage/app/public
      # Vite build assets
      - app_build_book_publisher:/var/www/public/build
    networks:
      - book-publisher-network
    depends_on:
      - app

networks:
  book-publisher-network:
    driver: bridge

volumes:
  app_bootstrap_book_publisher:
    driver: local
  app_build_book_publisher:
    driver: local
  app_public:
    driver: local
